services:
  - type: web
    name: chatbot-yellowai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "30"
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: http://127.0.0.1:5500,http://localhost:5500
